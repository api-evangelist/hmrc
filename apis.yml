apis:
- aid: hmrc:hmrc-vat-mtd-api
  name: HMRC VAT (Making Tax Digital) API
  tags:
  - Government
  - Tax
  - UK
  - VAT
  - Making Tax Digital
  - REST
  image: https://raw.githubusercontent.com/api-evangelist/hmrc/refs/heads/main/image.png
  humanURL: https://developer.service.hmrc.gov.uk/api-documentation/docs/api/service/vat-api/1.0
  baseURL: https://api.service.hmrc.gov.uk
  properties:
  - url: https://developer.service.hmrc.gov.uk/api-documentation/docs/api/service/vat-api/1.0
    type: Documentation
  - url: https://developer.service.hmrc.gov.uk/api-documentation/docs/api/service/vat-api/1.0/oas/page
    type: Reference
  - url: https://developer.service.hmrc.gov.uk/api-documentation/docs/authorisation
    type: Authentication
  - url: openapi/hmrc-vat-mtd-openapi.yml
    type: OpenAPI
  description: >-
    The HMRC VAT (Making Tax Digital) API enables software to submit VAT returns, retrieve VAT obligations, liabilities, payments, penalties, and customer details in compliance with UK Making Tax Digital requirements. Uses OAuth 2.0 authentication with fraud prevention headers required.

- aid: hmrc:hmrc-self-assessment-api
  name: HMRC Self Assessment API
  tags:
  - Government
  - Tax
  - UK
  - Self Assessment
  - Income Tax
  - REST
  image: https://raw.githubusercontent.com/api-evangelist/hmrc/refs/heads/main/image.png
  humanURL: https://developer.service.hmrc.gov.uk/api-documentation/docs/api
  baseURL: https://api.service.hmrc.gov.uk
  properties:
  - url: https://developer.service.hmrc.gov.uk/api-documentation/docs/api
    type: Documentation
  - url: https://developer.service.hmrc.gov.uk/api-documentation/docs/authorisation
    type: Authentication
  description: >-
    The HMRC Self Assessment APIs enable software to submit and manage self assessment tax returns, income sources, and tax calculations for individuals and sole traders under Making Tax Digital for Income Tax.

- aid: hmrc:hmrc-paye-api
  name: HMRC PAYE (Pay As You Earn) API
  tags:
  - Government
  - Tax
  - UK
  - PAYE
  - Payroll
  - REST
  image: https://raw.githubusercontent.com/api-evangelist/hmrc/refs/heads/main/image.png
  humanURL: https://developer.service.hmrc.gov.uk/api-documentation/docs/api
  baseURL: https://api.service.hmrc.gov.uk
  properties:
  - url: https://developer.service.hmrc.gov.uk/api-documentation/docs/api
    type: Documentation
  - url: https://developer.service.hmrc.gov.uk/api-documentation/docs/authorisation
    type: Authentication
  description: >-
    The HMRC PAYE APIs enable payroll software to submit employer payroll data, retrieve tax codes and employee records, and manage PAYE submissions for Real Time Information (RTI) reporting.

- aid: hmrc:hmrc-customs-declarations-api
